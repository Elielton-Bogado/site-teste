<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>InforOS | Sistema de O.S</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://teste.inforos.online/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://teste.inforos.online/assets/css/bootstrap-responsive.min.css">
    <link rel="stylesheet" href="https://teste.inforos.online/assets/css/matrix-style.css">
    <link rel="stylesheet" href="https://teste.inforos.online/assets/css/matrix-media.css">
    <link rel="stylesheet" href="https://teste.inforos.online/assets/css/fullcalendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #2e363f !important; }
        
        /* Ícones de Atalho Rápido (Topo) */
        .quick-actions { margin-top: 5px; }
        .quick-actions li { float: left; list-style: none; margin-right: 2px; }
        .quick-actions li a { background: #28b779; color: #fff; display: block; padding: 10px 14px; transition: 0.3s; }
        .quick-actions li a:hover { background: #27a9e3; }
        
        /* Gráficos e Widgets */
        .widget-box { background: #fff; border: 1px solid #cdcdcd; border-radius: 3px; margin-bottom: 20px; }
        .widget-title { background: #efefef; border-bottom: 1px solid #cdcdcd; height: 36px; }
        .widget-title span.icon { border-right: 1px solid #cdcdcd; padding: 9px 10px; float: left; opacity: 0.7; }
        .widget-title h5 { float: left; font-size: 12px; font-weight: bold; padding: 10px; line-height: 12px; margin: 0; }
        
        /* Efeitos de Hover no Sidebar */
        #sidebar ul li a { transition: all 0.2s ease; border-left: 4px solid transparent; }
        #sidebar ul li a:hover { padding-left: 30px !important; background: #27a9e3 !important; color: #fff !important; }
        #sidebar ul li.active a { border-left: 4px solid #27a9e3; }

        /* Ajustes de Cores Matrix */
        .bg_lo { background: #ff4b4b; } .bg_ly { background: #ffb848; }
        .bg_lg { background: #28b779; } .bg_lb { background: #27a9e3; }
    </style>
</head>
<body>

<div id="header">
    <h1><a href="index.html">InforOS</a></h1>
</div>

<div id="user-nav" class="navbar navbar-inverse">
    <ul class="nav">
        <li><a href="#"><i class="fa-solid fa-user"></i> <span class="text">Perfil</span></a></li>
        <li class="dropdown"><a href="#"><i class="fa-solid fa-envelope"></i> <span class="text">Mensagens</span> <span class="label label-important">5</span></a></li>
        <li><a href="#"><i class="fa-solid fa-gear"></i> <span class="text">Configurações</span></a></li>
        <li><a href="#"><i class="fa-solid fa-power-off"></i> <span class="text">Sair</span></a></li>
    </ul>
</div>

<div id="sidebar">
    <ul>
        <li class="active"><a href="index.html"><i class="fa-solid fa-house"></i> <span>Painel</span></a></li>
        <li><a href="clientes.html"><i class="fa-solid fa-user-group"></i> <span>Clientes</span></a></li>
        <li><a href="os.html"><i class="fa-solid fa-tags"></i> <span>Ordens de Serviço</span></a></li>
        <li><a href="#"><i class="fa-solid fa-server"></i> <span>Equipamentos</span></a></li>
        <li><a href="#"><i class="fa-solid fa-money-bill-1-wave"></i> <span>Financeiro</span></a></li>
    </ul>
</div>

<div id="content">
    <div id="content-header">
        <div id="breadcrumb"> <a href="#" class="tip-bottom"><i class="fa-solid fa-house"></i> Home</a></div>
        
        <div class="quick-actions">
            <ul>
                <li><a href="os.html"><i class="fa-solid fa-plus"></i> Nova OS</a></li>
                <li><a href="clientes.html"><i class="fa-solid fa-user-plus"></i> Novo Cliente</a></li>
                <li><a href="#"><i class="fa-solid fa-wallet"></i> Pagamentos</a></li>
            </ul>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row-fluid">
            <div class="span6">
                <div class="widget-box">
                    <div class="widget-title"> <span class="icon"><i class="fa-solid fa-chart-pie"></i></span>
                        <h5>Situação de O.S</h5>
                    </div>
                    <div class="widget-content">
                        <canvas id="osChart" height="200"></canvas>
                    </div>
                </div>
            </div>
            <div class="span6">
                <div class="widget-box">
                    <div class="widget-title"> <span class="icon"><i class="fa-solid fa-calendar-days"></i></span>
                        <h5>Calendário de Prazos</h5>
                    </div>
                    <div class="widget-content nopadding">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row-fluid">
            <div class="span12">
                <div class="widget-box">
                    <div class="widget-title"> <span class="icon"><i class="fa-solid fa-signal"></i></span>
                        <h5>Estatísticas de Faturamento</h5>
                    </div>
                    <div class="widget-content">
                        <canvas id="revenueChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="footer" class="span12"> 2026 © InforOS - Fidelidade Total </div>

<script src="https://teste.inforos.online/assets/js/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://teste.inforos.online/assets/js/matrix.js"></script>

<script>
    // Gráfico de Pizza (O.S)
    const ctxOs = document.getElementById('osChart').getContext('2d');
    new Chart(ctxOs, {
        type: 'pie',
        data: {
            labels: ['Aberto', 'Faturado', 'Em Andamento'],
            datasets: [{
                data: [54, 122, 37],
                backgroundColor: ['#ef4444', '#10b981', '#3b82f6']
            }]
        }
    });

    // Gráfico de Barras (Faturamento)
    const ctxRev = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctxRev, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr'],
            datasets: [{
                label: 'Receita R$',
                data: [2500, 3831, 1200, 4500],
                backgroundColor: '#27a9e3'
            }]
        }
    });
</script>
</body>
</html>
